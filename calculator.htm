<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator</title>
  <style>
    body{
      font-family: Arial;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .card{
      background: wheat;
      padding: 50px;
      border-radius: 12px;
      width: 100%;
      max-width: 360px;
      box-shadow: 12px 4px 12px rgb(16, 17, 17);
    }

    h2 {
      margin-bottom: 20px;
      color: #5533cc;
    }

    label {
      display: block;
      font-size: 20px;
      color: #666;
      margin-top: 15px;
      margin-bottom: 13px;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 25px;
      box-sizing:border-box;
    }

    button {
      margin-top: 24px;
      width:100%;
      background: #5533cc;
      color: aliceblue;
      padding: 12px;
      border-radius: 8px;
      border: none;
      box-shadow: 0px 8px 18px rgba(255,225,255,0.1);
      font-size: 25px;
      cursor: pointer;
    }

    #result{
      margin-top: 20px;
      font-size: 15px;
      color: #333;
      line-height: 2.7;
      border-radius: 20px;

    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Tip Calculator</h2>

    <label>Bill Amount ($)</label>
    <input type="number" id="bill" placeholder="e.g. 50"/>

    <label>Tip Percentage (%)</label>
    <input type="number" id="tip" placeholder="e.g. 15" />

    <button id="calculator">Calculator</button>

    <div id="result">
    
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', function() {

  let button = document.querySelector('#calculator')

  button.addEventListener('click', function() {
    let bill = document.querySelector('#bill').value
    let tip = document.querySelector('#tip').value
    let result = document.querySelector('#result')

    if (bill === '' || bill === '0') {
      result.textContent = 'Please enter a bill amount'
      return
    }

    let tipAmount = (bill * tip) / 100
    let total = parseFloat(bill) + tipAmount

    result.innerHTML = '<strong>Tip:</strong> $' + tipAmount.toFixed(2) + '<br><strong>Total:</strong> $' + total.toFixed(2)
  })

})
  </script>
  
</body>
</html>
